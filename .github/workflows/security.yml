# <target-repo>/.github/workflows/security.yml
name: security
on:
  pull_request:
  workflow_dispatch:
permissions:
  contents: read

jobs:
  osv-scan:
    uses: gr1m0h/.github/.github/workflows/osv-scanner.yml@53dfc315343cee85902bbe47c6026f08d4f1965d
    permissions:
      contents: read
      security-events: write
  gitleaks:
    uses: gr1m0h/.github/.github/workflows/gitleaks.yml@53dfc315343cee85902bbe47c6026f08d4f1965d
  dependency-review:
    if: github.event_name == 'pull_request'
    uses: gr1m0h/.github/.github/workflows/dependency-review.yml@53dfc315343cee85902bbe47c6026f08d4f1965d
    permissions:
      contents: read
      pull-requests: write
  actionlint:
    uses: gr1m0h/.github/.github/workflows/actions-pin-lint.yml@53dfc315343cee85902bbe47c6026f08d4f1965d
